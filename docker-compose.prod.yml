version: '3.8'

services:
  whisper-asr:
    build:
      context: .
      dockerfile: Dockerfile
    image: whisperlivekit:latest
    container_name: whisper-asr
    ports:
      - "8000:8000"
    volumes:
      - ./keywords_example.txt:/app/keywords.txt:ro
      # Mount local model from D: drive
      - D:/python/FastWhisperTranscriber/model:/app/models:ro
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/models
      - LOG_LEVEL=INFO
    command: [
      "--model", "small",
      "--model-path", "/app/models/models--Systran--faster-whisper-small",
      "--language", "zh",
      "--backend-policy", "localagreement",
      "--backend", "faster-whisper",
      "--keywords-file", "/app/keywords.txt",
      "--host", "0.0.0.0",
      "--port", "8000"
    ]
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional: Add Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: whisper-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - whisper-asr
    restart: unless-stopped
